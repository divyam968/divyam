<!DOCTYPE html>
<html>
<head>
<title>AI Resume Analyzer</title>

<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: 20px;
  width: 420px;
  text-align: center;
  box-shadow: 0 0 30px rgba(0,255,200,0.2);
}

/* TITLE */
h1 {
  margin-bottom: 10px;
  color: #00ffcc;
}

p {
  font-size: 14px;
  color: #ccc;
}

/* FILE INPUT */
input[type="file"] {
  margin-top: 20px;
  padding: 10px;
  background: #111;
  color: white;
  border-radius: 8px;
  border: none;
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #00ffcc, #00ccaa);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00ffcc;
}

/* RESULT CARD */
#result {
  margin-top: 25px;
  text-align: left;
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 10px;
  max-height: 300px;
  overflow-y: auto;
}

/* JOB BUTTONS */
#result button {
  margin-top: 8px;
  padding: 6px 12px;
  background: #00ffcc;
  color: black;
  border-radius: 6px;
}

/* PROGRESS BAR */
.progress-container {
  margin-top: 15px;
}

.progress-bar {
  width: 100%;
  background: #222;
  border-radius: 10px;
  overflow: hidden;
  height: 20px;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00ffcc, #00ccaa);
  text-align: center;
  color: black;
  font-weight: bold;
  line-height: 20px;
  transition: width 1s ease-in-out;
}

.circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: conic-gradient(#00ffcc 0deg, #222 0deg);
  display: flex;
  align-items: center;
  justify-content: center;
}

.inner {
  width: 90px;
  height: 90px;
  background: #111;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

#circleScore {
  color: #00ffcc;
  font-weight: bold;
  font-size: 18px;
}

</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>🚀 AI Resume Analyzer</h1>
    <p>Upload your resume and get AI-powered job insights</p>

    <input type="file" id="resumeUpload" />

    <br>
    <button id="analyzeBtn">Analyze Resume</button>

    <div id="result"></div>

  </div>
</div>

<script>

// 🔥 JOB OPEN FUNCTION
function openJob(role, site) {
  const query = encodeURIComponent(role);

  let url = "";

  if (site === "linkedin") {
    url = `https://www.linkedin.com/jobs/search/?keywords=${query}&location=India`;
  } 
  else if (site === "naukri") {
    url = `https://www.naukri.com/${role.replace(/\s+/g, "-")}-jobs`;
  } 
  else if (site === "indeed") {
    url = `https://www.indeed.com/jobs?q=${query}&l=India`;
  }

  window.open(url, "_blank");
}
  // 🔥 MAIN ANALYZE FUNCTION
async function analyze() {

  // 🔥 LOADING UI
  document.getElementById("result").innerHTML = `
    <div style="text-align:center;">
      <p style="color:#00ffcc;">Analyzing Resume... ⏳</p>
      <div style="
        width:100%;
        background:#222;
        border-radius:10px;
        overflow:hidden;
        margin-top:10px;
      ">
        <div id="loadingBar" style="
          width:0%;
          height:10px;
          background:#00ffcc;
          transition: width 1s ease;
        "></div>
      </div>
    </div>
  `;

  // 🔄 loading animation
  let progress = 0;
  let interval = setInterval(() => {
    progress += 10;
    document.getElementById("loadingBar").style.width = progress + "%";

    if (progress >= 90) clearInterval(interval);
  }, 300);


  // 📂 FILE CHECK
  const file = document.getElementById("resumeUpload").files[0];

  if (!file) {
    alert("Upload resume first");
    return;
  }

  const formData = new FormData();
  formData.append("resume", file);

  try {
    const res = await fetch("/analyze", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    // 🔥 FORMAT
    let formatted = data.result
      .replace(/\*\*(.*?)\*\*/g, "<h3 style='color:#00ffcc'>$1</h3>")
      .replace(/\n/g, "<br>")
      .replace(/\*/g, "• ");

    // 🎯 SCORE
    let scoreMatch = data.result.match(/Score:\s*(\d+)/);
    let score = scoreMatch ? parseInt(scoreMatch[1]) : 0;

    // 📊 CIRCULAR BAR
    let circularBar = `
      <div style="display:flex;justify-content:center;margin:20px 0;">
        <div class="circle">
          <div class="inner">
            <span id="circleScore">0%</span>
          </div>
        </div>
      </div>
    `;

    // 🎯 ROLES
    let roles = [];
    const lines = data.result.split("\n");

    lines.forEach(line => {
      if (line.toLowerCase().includes("match")) {
        let role = line.split("- Match")[0];
        role = role.replace("-", "").trim();
        if (role) roles.push(role);
      }
    });

    // 🔥 JOB BUTTONS
    let jobLinks = `<h3 style="color:#00ffcc">🚀 Apply Jobs</h3>`;

    roles.forEach(role => {
            jobLinks += `
<div style="margin-top:10px">
  <b>${role}</b><br>

  <div style="margin-top:8px; display:flex; gap:10px; flex-wrap:wrap;">

    <button onclick="openJob('${role}', 'linkedin')"
    style="padding:6px 10px;border:none;border-radius:6px;background:#0077b5;color:white;cursor:pointer;">
    LinkedIn
    </button>

    <button onclick="openJob('${role}', 'naukri')"
    style="padding:6px 10px;border:none;border-radius:6px;background:#ff6a00;color:white;cursor:pointer;">
    Naukri
    </button>

    <button onclick="openJob('${role}', 'indeed')"
    style="padding:6px 10px;border:none;border-radius:6px;background:#2557a7;color:white;cursor:pointer;">
    Indeed
    </button>

  </div>
</div>
`;
    });

    // ✅ STOP LOADING
    clearInterval(interval);
    document.getElementById("loadingBar").style.width = "100%";

    // 💎 FINAL UI
    document.getElementById("result").innerHTML = `
      <div style="
        background: linear-gradient(135deg, #1e1e1e, #111);
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0,255,200,0.2);
      ">
        ${formatted}
        <br>
        ${circularBar}
        <br>
        ${jobLinks}
      </div>
    `;

    // 🔥 CIRCLE ANIMATION (CORRECT PLACE)
   setTimeout(() => {
  let circle = document.querySelector(".circle");
  let text = document.getElementById("circleScore");

  let deg = score * 3.6;

  // 🔥 COLOR LOGIC ADD YAHAN
  let color = "#00ffcc";

  if (score < 40) color = "red";
  else if (score < 70) color = "yellow";
  else color = "#00ffcc";

  if (circle && text) {
    circle.style.background = `conic-gradient(${color} ${deg}deg, #222 ${deg}deg)`;
    text.innerText = score + "%";
    text.style.color = color;
  }
}, 300);

 
  } catch (err) {
    console.error(err);
    document.getElementById("result").innerText = "Error connecting backend ❌";
  }
}
// 🔥 BUTTON CONNECT
document.getElementById("analyzeBtn").addEventListener("click", analyze);

</script>

</body>
</html>
